name: Build

on:
  push:
    branches:
      - master
      - dev
      - feature/sony-support
  workflow_dispatch:

env:
  CANON_EDSDK_MACOS_URL: "https://uploads.brickfilms.com/files/1/29d5aec8-edsdkv132010m.zip"
  CANON_EDSDK_WINDOWS_URL: "https://uploads.brickfilms.com/files/1/a3039b9f-edsdkv132010w.zip"
  CANON_EDSDK_LINUX_URL: "https://uploads.brickfilms.com/files/1/a0d2f38c-edsdkv132010l.zip"
  # Nikon Remote SDK (S-SDKZ-200BF-ALLIN) — a single multi-platform archive that
  # contains both Module/Mac (macOS) and Module/Win (Windows) runtimes. The macOS
  # and Windows jobs each extract only the part they need.
  #
  # backend-nikon-zs2 dlopen's / LoadLibrary's the CS-Layer at runtime (no build-time
  # link), so the Rust build succeeds WITHOUT this archive — the URL only stages
  # the runtime so the packaged artifact is actually runnable. Staging is
  # best-effort: leaving this empty just skips it (no Nikon runtime in the zip).
  # TODO: set to the hosted Nikon SDK archive URL (or wire a secret) to ship it.
  NIKON_SDK_URL: "https://uploads.brickfilms.com/files/1/cd8a665a-s-sdkz-200bf-allin-1.zip"
  # libgphoto2 is compiled from source (the OS packages are often outdated).
  # Pin a branch, tag, or full commit SHA of github.com/gphoto/libgphoto2.
  LIBGPHOTO2_REF: "7fc007d0ba6b52b8608da7b46920ae2416a94358"
  # Sony Camera Remote SDK (CrSDK). Unlike the Canon/Nikon runtimes (loaded at run
  # time), Cr_Core is LINKED at build time, so backend-sony cannot build without it
  # — this URL is REQUIRED (the Sony staging step fails hard if empty). The archive
  # bundles Sony's per-platform SDK packages verbatim, one zip each (names as
  # shipped, see external/SONY/): CrSDK_*_Win64.zip / _Mac.zip / _Linux64PC.zip.
  # scripts/stage-sony-crsdk.sh unpacks the right one into external/SONY/CrSDK/
  # (headers + Cr_Core / monitor_protocol libs + CrAdapter/ plugins).
  # TODO: set to the hosted Sony CrSDK archive URL (or wire a secret).
  SONY_CRSDK_URL: "https://uploads.brickfilms.com/files/1/a9115202-sonysdk.zip"

jobs:
  # ---------------------------------------------------------------------------
  # macOS — Universal Binary (x86_64 + arm64)
  # The Canon EDSDK.framework ships as a universal binary, so a single output
  # binary works natively on both Intel and Apple Silicon Macs.
  # ---------------------------------------------------------------------------
  build-macos:
    name: Build (macOS universal)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust targets
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Install Canon EDSDK
        run: |
          # Download the outer zip (contains EDSDKv132010M/Macintosh/Macintosh.dmg)
          curl -fsSL "${{ env.CANON_EDSDK_MACOS_URL }}" -o canon_sdk.zip
          unzip -q canon_sdk.zip -d canon_sdk_tmp

          # Locate the DMG inside the extracted tree (handle plain .dmg or .dmg.zip)
          DMG=$(find canon_sdk_tmp -name "*.dmg" ! -name "*.dmg.zip" | head -1)
          if [ -z "$DMG" ]; then
            DMG_ZIP=$(find canon_sdk_tmp -name "*.dmg.zip" | head -1)
            [ -z "$DMG_ZIP" ] && { echo "ERROR: no DMG found in SDK zip"; exit 1; }
            unzip -q "$DMG_ZIP" -d canon_sdk_tmp/inner
            DMG=$(find canon_sdk_tmp/inner -name "*.dmg" | head -1)
          fi
          [ -z "$DMG" ] && { echo "ERROR: could not extract DMG"; exit 1; }

          # Mount the DMG
          MOUNT_POINT=$(mktemp -d)
          hdiutil attach "$DMG" -mountpoint "$MOUNT_POINT" -nobrowse -quiet

          # Copy the framework using ditto to preserve symlinks and resource forks
          mkdir -p external/EDSDK/EDSDKv132010M
          ditto "$MOUNT_POINT/EDSDK/Framework/EDSDK.framework" \
                external/EDSDK/EDSDKv132010M/EDSDK.framework

          hdiutil detach "$MOUNT_POINT" -quiet

      - name: Install libgphoto2 build tools + deps (both arches)
        run: |
          set -eo pipefail
          # Native arm64 toolchain + libgphoto2 runtime deps (Homebrew at
          # /opt/homebrew). autoconf/automake/libtool/gettext are needed to build
          # libgphoto2 from a git checkout; libusb/libexif are its link deps.
          brew install autoconf automake libtool pkg-config gettext libusb libexif
          # The universal binary's x86_64 slice needs x86_64 deps, but the arm64
          # runner ships no Intel Homebrew. Install one at /usr/local under Rosetta
          # and pull the Intel bottles there.
          sudo softwareupdate --install-rosetta --agree-to-license || true
          if [ ! -x /usr/local/bin/brew ]; then
            curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh -o /tmp/brew-install.sh
            arch -x86_64 /bin/bash -c "NONINTERACTIVE=1 /bin/bash /tmp/brew-install.sh"
          fi
          arch -x86_64 /usr/local/bin/brew install autoconf automake libtool pkg-config gettext libusb libexif

      - name: Build libgphoto2 from source (arm64)
        run: |
          export PKG_CONFIG_PATH="/opt/homebrew/lib/pkgconfig"
          bash scripts/build-libgphoto2.sh "$LIBGPHOTO2_REF" "$HOME/gphoto2-arm"

      - name: Build libgphoto2 from source (x86_64)
        run: |
          # Run the whole build as an x86_64 process (Rosetta) so clang defaults to
          # the x86_64 target and config.guess reports x86_64. The script picks up
          # the /usr/local (Intel) toolchain from uname -m.
          arch -x86_64 /bin/bash -c '
            set -eo pipefail
            export PATH="/usr/local/bin:$PATH"
            export PKG_CONFIG_PATH="/usr/local/lib/pkgconfig"
            bash scripts/build-libgphoto2.sh "$LIBGPHOTO2_REF" "$HOME/gphoto2-x86"
          '

      - name: Install Nikon Remote SDK runtime (best-effort)
        # backend-nikon-zs2 dlopen's the CS-Layer at runtime (no build-time link), so
        # this only stages the runtime for a runnable artifact — the Rust build
        # still succeeds without it. Skipped when NIKON_SDK_URL is empty.
        run: |
          URL="${{ env.NIKON_SDK_URL }}"
          if [ -z "$URL" ]; then
            echo "NIKON_SDK_URL empty — skipping Nikon runtime (backend still builds)."
            exit 0
          fi
          curl -fsSL "$URL" -o nikon_sdk.zip
          # Only the macOS runtime is needed here: a nested TestApp.zip under Module/Mac.
          unzip -q -o nikon_sdk.zip "Module/Mac/BinaryFile/TestApp.zip" -d nikon_sdk_tmp
          unzip -q -o "nikon_sdk_tmp/Module/Mac/BinaryFile/TestApp.zip" -d nikon_testapp

          BUNDLE="nikon_testapp/TestApp/TestApp/TypeCommon Module.bundle"
          FRAMEWORKS="nikon_testapp/TestApp/Frameworks"
          CFGDIR="nikon_testapp/TestApp/TestApp"
          [ -d "$BUNDLE" ] || { echo "ERROR: '$BUNDLE' missing in Nikon SDK archive"; exit 1; }
          [ -d "$FRAMEWORKS" ] || { echo "ERROR: '$FRAMEWORKS' missing in Nikon SDK archive"; exit 1; }

          mkdir -p external/NIKON/runtime/config
          # ditto preserves the bundle's code signature and the framework's version
          # symlinks (a plain cp -r would flatten them and break loading). build.rs
          # then rewrites install names / rpaths and re-signs (see fixup_nikon_runtime).
          ditto "$BUNDLE" "external/NIKON/runtime/TypeCommon Module.bundle"
          ditto "$FRAMEWORKS" "external/NIKON/runtime/Frameworks"
          for cfg in DC_PTP_Config.config MaidLayer.config RangeValue.config; do
            if [ -f "$CFGDIR/$cfg" ]; then
              cp "$CFGDIR/$cfg" external/NIKON/runtime/config/
            else
              echo "WARNING: Nikon config $cfg not found in archive"
            fi
          done
          echo "Nikon macOS runtime staged into external/NIKON/runtime"

      - name: Stage Sony Camera Remote SDK
        # REQUIRED: Cr_Core is linked at build time (backend-sony can't build
        # without it). The macOS SDK dylibs are universal (x86_64 + arm64), so both
        # slices of the lipo build link fine.
        run: bash scripts/stage-sony-crsdk.sh "${{ env.SONY_CRSDK_URL }}" mac

      - name: Build x86_64
        env:
          PKG_CONFIG_ALLOW_CROSS: "1"
        run: |
          # Link against the from-source Intel libgphoto2; fall back to /usr/local
          # brew .pc files for its deps (libusb, libexif, …).
          export PKG_CONFIG_PATH="$HOME/gphoto2-x86/lib/pkgconfig:/usr/local/lib/pkgconfig"
          cargo build --release \
            --target x86_64-apple-darwin \
            --features backend-webcam-macos,backend-canon,backend-gphoto2,backend-nikon-zs2,backend-sony,backend-remote

      - name: Build arm64
        run: |
          export PKG_CONFIG_PATH="$HOME/gphoto2-arm/lib/pkgconfig:/opt/homebrew/lib/pkgconfig"
          cargo build --release \
            --target aarch64-apple-darwin \
            --features backend-webcam-macos,backend-canon,backend-gphoto2,backend-nikon-zs2,backend-sony,backend-remote

      - name: Create universal binary with lipo
        run: |
          lipo -create \
            target/x86_64-apple-darwin/release/toucan-camera-server \
            target/aarch64-apple-darwin/release/toucan-camera-server \
            -output toucan-camera-server-macos

      - name: Package into zip
        run: |
          mkdir -p dist/toucan-camera-server-macos

          cp toucan-camera-server-macos dist/toucan-camera-server-macos/toucan-camera-server

          # Add a relative rpath so the binary finds EDSDK.framework next to itself
          # when run outside the build tree.
          install_name_tool \
            -add_rpath @executable_path \
            dist/toucan-camera-server-macos/toucan-camera-server

          # Canon framework — only if present (SDK installed in CI)
          FRAMEWORK_SRC="external/EDSDK/EDSDKv132010M/EDSDK.framework"
          if [ -d "$FRAMEWORK_SRC" ]; then
            cp -R "$FRAMEWORK_SRC" dist/toucan-camera-server-macos/
          fi

          # gphoto2 runtime: lipo-merge the per-arch libs/plugins staged by
          # build.rs and rewrite their install names to be relocatable, so the
          # universal binary ships without a system libgphoto2.
          bash scripts/macos-bundle-gphoto2.sh \
            target/x86_64-apple-darwin/release \
            target/aarch64-apple-darwin/release \
            dist/toucan-camera-server-macos

          # Nikon runtime — staged and fixed-up by build.rs in the per-arch release
          # dir; the SDK binaries are universal, so copy from one arch. The backend
          # dlopen's "TypeCommon Module.bundle" next to the binary and resolves the
          # sibling Frameworks/ via @loader_path, so both sit at the artifact root.
          # Only present if the Nikon SDK was provided (see the Nikon staging step).
          NIKON_REL="target/aarch64-apple-darwin/release"
          if [ -d "$NIKON_REL/TypeCommon Module.bundle" ]; then
            ditto "$NIKON_REL/TypeCommon Module.bundle" \
                  "dist/toucan-camera-server-macos/TypeCommon Module.bundle"
            ditto "$NIKON_REL/Frameworks" "dist/toucan-camera-server-macos/Frameworks"
            for cfg in DC_PTP_Config.config MaidLayer.config RangeValue.config; do
              [ -f "$NIKON_REL/$cfg" ] && cp "$NIKON_REL/$cfg" dist/toucan-camera-server-macos/
            done
            echo "Nikon runtime bundled into the macOS artifact"
          fi

          # Sony CrSDK runtime — Cr_Core + monitor_protocol dylibs + CrAdapter/
          # transport plugins staged next to the per-arch binary by build.rs. The
          # dylibs are universal, so copy from one arch; the binary resolves them
          # via @loader_path (rpath added by build.rs).
          SONY_REL="target/aarch64-apple-darwin/release"
          for lib in libCr_Core.dylib libmonitor_protocol.dylib libmonitor_protocol_pf.dylib; do
            [ -f "$SONY_REL/$lib" ] && cp "$SONY_REL/$lib" dist/toucan-camera-server-macos/
          done
          if [ -d "$SONY_REL/CrAdapter" ]; then
            cp -R "$SONY_REL/CrAdapter" dist/toucan-camera-server-macos/
            echo "Sony CrSDK runtime bundled into the macOS artifact"
          fi

          cd dist/toucan-camera-server-macos
          zip -r ../toucan-camera-server-macos.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: toucan-camera-server-macos
          path: dist/toucan-camera-server-macos.zip
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Windows — x86_64
  # Canon EDSDK only ships for x86_64 on Windows. ARM64 Windows users can run
  # the x86_64 binary via the built-in x64 emulation layer.
  # ---------------------------------------------------------------------------
  build-windows:
    name: Build (Windows x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Canon EDSDK
        run: |
          New-Item -ItemType Directory -Force -Path external\EDSDK\ | Out-Null
          Invoke-WebRequest -Uri "$env:CANON_EDSDK_WINDOWS_URL" -OutFile canon_sdk.zip
          Expand-Archive canon_sdk.zip -DestinationPath external\EDSDK\

      - name: Download Nikon Remote SDK runtime (best-effort)
        # backend-nikon-zs2 LoadLibrary's the CS-Layer at runtime (no build-time link),
        # so this only stages the runtime for a runnable artifact — the Rust build
        # still succeeds without it. Skipped when NIKON_SDK_URL is empty.
        shell: pwsh
        run: |
          $url = "${{ env.NIKON_SDK_URL }}"
          if ([string]::IsNullOrEmpty($url)) {
            Write-Host "NIKON_SDK_URL empty — skipping Nikon runtime (backend still builds)."
            exit 0
          }
          Invoke-WebRequest -Uri $url -OutFile nikon_sdk.zip
          Expand-Archive nikon_sdk.zip -DestinationPath nikon_sdk_tmp -Force
          # The Windows runtime ships as loose, ready-to-use files under Module/Win.
          $binSrc = "nikon_sdk_tmp\Module\Win\BinaryFile"
          if (-not (Test-Path $binSrc)) {
            Write-Error "Module\Win\BinaryFile not found in Nikon SDK archive"; exit 1
          }
          $dest = "external\NIKON\Module\Win\BinaryFile"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Copy-Item "$binSrc\*" $dest -Recurse -Force
          Write-Host "Nikon Windows runtime staged into $dest"

      - name: Stage Sony Camera Remote SDK
        # REQUIRED: Cr_Core.lib is linked at build time. Run under bash (Git for
        # Windows ships unzip/curl) so the shared staging script works as elsewhere.
        shell: bash
        run: bash scripts/stage-sony-crsdk.sh "${{ env.SONY_CRSDK_URL }}" win64

      - name: Build x86_64
        run: |
          cargo build --release `
            --target x86_64-pc-windows-msvc `
            --features backend-webcam-windows,backend-canon,backend-nikon-zs2,backend-sony,backend-remote

      - name: Package into zip
        shell: pwsh
        run: |
          $out = "dist\toucan-camera-server-windows"
          New-Item -ItemType Directory -Force -Path $out | Out-Null

          Copy-Item "target\x86_64-pc-windows-msvc\release\toucan-camera-server.exe" $out

          # Canon DLLs — only if they were copied by build.rs (SDK present)
          $dlls = @("EDSDK.dll", "EdsImage.dll")
          foreach ($dll in $dlls) {
            $src = "target\x86_64-pc-windows-msvc\release\$dll"
            if (Test-Path $src) {
              Copy-Item $src $out
            }
          }

          # Nikon runtime — DLLs + config files staged next to the binary by
          # build.rs (only present if the Nikon SDK was provided). The backend
          # LoadLibrary's ControlServiceLayer.dll and deploys the .config files to
          # %APPDATA%\Nikon\NXTether at startup from these copies.
          $nikon = @(
            "ControlServiceLayer.dll", "NkdPTP.dll", "NkRoyalmile.dll", "dnssd.dll",
            "DC_PTP_Config.config", "MaidLayer.config", "RangeValue.config"
          )
          foreach ($f in $nikon) {
            $src = "target\x86_64-pc-windows-msvc\release\$f"
            if (Test-Path $src) {
              Copy-Item $src $out
            }
          }

          # Sony CrSDK runtime — Cr_Core + monitor_protocol DLLs + the CrAdapter/
          # transport plugins staged next to the binary by build.rs (the import lib
          # Cr_Core.lib is intentionally not shipped). Only present if the Sony SDK
          # was staged.
          $sony = @("Cr_Core.dll", "monitor_protocol.dll", "monitor_protocol_pf.dll")
          foreach ($f in $sony) {
            $src = "target\x86_64-pc-windows-msvc\release\$f"
            if (Test-Path $src) {
              Copy-Item $src $out
            }
          }
          $sonyAdapter = "target\x86_64-pc-windows-msvc\release\CrAdapter"
          if (Test-Path $sonyAdapter) {
            Copy-Item $sonyAdapter $out -Recurse -Force
          }

          Compress-Archive -Path "$out\*" -DestinationPath "dist\toucan-camera-server-windows.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: toucan-camera-server-windows
          path: dist/toucan-camera-server-windows.zip
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Linux — x86_64
  # Canon's Linux SDK ships only as libEDSDK.so (dynamic, glibc-bound) for
  # x86_64 / ARM64 / ARM32. There is no 32-bit x86 build, and a fully static
  # binary is not possible — libEDSDK.so cannot be linked statically. We
  # build on ubuntu-22.04 for older-glibc compatibility (glibc 2.35+) and
  # ship the binary alongside libEDSDK.so, found at runtime via rpath=$ORIGIN.
  # Runtime requirements on the target Linux host:
  #   - libusb-1.0 (typically pre-installed)
  #   - libgphoto2 (the gphoto2 backend links it dynamically; not bundled)
  #   - read/write permissions on the camera USB node (see Canon udev rules)
  #   - webcam access: shipped install.sh sets up a uaccess udev rule so the
  #     active desktop user gets ACL access to /dev/video* without group changes
  # ---------------------------------------------------------------------------
  build-linux:
    name: Build (Linux x86_64)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build and runtime dependencies
        # libusb-1.0-0 is a transitive runtime dep of libEDSDK.so; we install
        # it on the runner so the post-build `ldd` sanity check can resolve
        # the full dependency graph and catch any breakage early.
        # libgphoto2 is compiled from source (see next step), so we install its
        # build tools (autoconf/automake/libtool/gettext) and link deps
        # (libusb/libexif/libltdl -dev) instead of the outdated libgphoto2-dev.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config unzip libusb-1.0-0 patchelf \
            git autoconf automake libtool libtool-bin gettext autopoint \
            libusb-1.0-0-dev libexif-dev libltdl-dev \
            libxml2

      - name: Install Canon EDSDK
        run: |
          mkdir -p external/EDSDK
          curl -fsSL "${{ env.CANON_EDSDK_LINUX_URL }}" -o canon_sdk.zip
          unzip -q canon_sdk.zip -d external/EDSDK/
          # Validate expected layout so the build fails early with a clear
          # message if Canon repackages the archive.
          test -f "external/EDSDK/EDSDKv132010L/Linux/EDSDK/Library/x86_64/libEDSDK.so" \
            || { echo "ERROR: libEDSDK.so missing from Canon archive"; exit 1; }

      - name: Build libgphoto2 from source
        run: |
          bash scripts/build-libgphoto2.sh "$LIBGPHOTO2_REF" "$HOME/gphoto2"

      - name: Stage Sony Camera Remote SDK
        # REQUIRED: libCr_Core.so is linked at build time.
        run: bash scripts/stage-sony-crsdk.sh "${{ env.SONY_CRSDK_URL }}" linux64pc

      - name: Build x86_64
        run: |
          # Link against the from-source libgphoto2. LD_LIBRARY_PATH lets build.rs's
          # ldd-based bundle walk resolve libgphoto2_port for the camlibs plugins.
          export PKG_CONFIG_PATH="$HOME/gphoto2/lib/pkgconfig"
          export LD_LIBRARY_PATH="$HOME/gphoto2/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
          cargo build --release \
            --target x86_64-unknown-linux-gnu \
            --features backend-canon,backend-gphoto2,backend-webcam-linux,backend-sony,backend-remote

      - name: Package
        run: |
          OUT="dist/toucan-camera-server-linux"
          REL="target/x86_64-unknown-linux-gnu/release"
          mkdir -p "$OUT"
          cp "$REL/toucan-camera-server" "$OUT/"
          cp "$REL/libEDSDK.so" "$OUT/"
          # gphoto2 runtime bundle staged by build.rs (libs from the manifest +
          # camlibs/iolibs plugin dirs), each already given an $ORIGIN rpath.
          if [ -f "$REL/gphoto2-bundle.manifest" ]; then
            # `|| [ -n "$lib" ]` so the final manifest entry is copied even if the
            # file has no trailing newline (otherwise `read` drops it at EOF).
            while IFS= read -r lib || [ -n "$lib" ]; do
              [ -n "$lib" ] && cp "$REL/$lib" "$OUT/"
            done < "$REL/gphoto2-bundle.manifest"
            cp -R "$REL/camlibs" "$REL/iolibs" "$OUT/" 2>/dev/null || true
          fi
          # Sony CrSDK runtime — libCr_Core.so (linked, rpath=$ORIGIN) + the dlopen'd
          # monitor_protocol libs and CrAdapter/ transport plugins, all staged next
          # to the binary by build.rs. Copied before the ldd check so libCr_Core.so
          # resolves via $ORIGIN. monitor_protocol is dlopen'd, so it is not part of
          # the binary's ldd graph.
          for lib in libCr_Core.so libmonitor_protocol.so libmonitor_protocol_pf.so; do
            [ -f "$REL/$lib" ] && cp "$REL/$lib" "$OUT/"
          done
          [ -d "$REL/CrAdapter" ] && cp -R "$REL/CrAdapter" "$OUT/"
          # libCr_Core.so's only non-glibc NEEDED is libxml2.so.2. Ship it rather
          # than rely on the host: distributions have started moving to libxml2 2.15
          # (soname libxml2.so.16) and no longer package the .so.2 at all (Ubuntu
          # 26.04), where the binary would die at load with "libxml2.so.2: cannot
          # open shared object file". libCr_Core.so has RUNPATH=$ORIGIN, so a copy
          # next to it resolves. MIT-licensed, redistribution is fine.
          XML2="$(ldconfig -p | awk '/libxml2\.so\.2 \(libc6,x86-64\)/ {print $NF; exit}')"
          [ -n "$XML2" ] || { echo "ERROR: libxml2.so.2 not found on the runner"; exit 1; }
          cp -L "$XML2" "$OUT/libxml2.so.2"
          # Webcam permissions setup — udev rule + install script.
          # End-user runs ./install.sh once after extraction (uses sudo).
          cp packaging/linux/99-toucan-camera.rules "$OUT/"
          cp packaging/linux/install.sh "$OUT/"
          chmod +x "$OUT/install.sh"
          # Sanity checks against the bundled layout:
          #  1. The binary must resolve libEDSDK.so and libCr_Core.so via rpath=$ORIGIN.
          #  2. No dependency in the full transitive graph may be missing.
          cd "$OUT"
          ldd ./toucan-camera-server > /tmp/ldd.txt
          echo "--- ldd output ---"; cat /tmp/ldd.txt; echo "------------------"
          grep -F 'libEDSDK.so' /tmp/ldd.txt > /dev/null \
            || { echo "ERROR: libEDSDK.so not in dependency list"; exit 1; }
          grep -F 'libEDSDK.so => not found' /tmp/ldd.txt \
            && { echo "ERROR: libEDSDK.so present but unresolved (rpath broken)"; exit 1; }
          grep -F 'libCr_Core.so' /tmp/ldd.txt > /dev/null \
            || { echo "ERROR: libCr_Core.so not in dependency list"; exit 1; }
          grep -F 'libCr_Core.so => not found' /tmp/ldd.txt \
            && { echo "ERROR: libCr_Core.so present but unresolved (rpath broken)"; exit 1; }
          #  3. libxml2.so.2 must resolve to OUR bundled copy, not the runner's
          #     system one — otherwise the artifact silently depends on a lib that
          #     recent distros no longer ship (see the packaging step).
          XML2_RESOLVED="$(awk '/libxml2\.so\.2 =>/ {print $3}' /tmp/ldd.txt)"
          case "$XML2_RESOLVED" in
            "$PWD"/libxml2.so.2) ;;
            *) echo "ERROR: libxml2.so.2 resolves to '$XML2_RESOLVED', not the bundled copy"; exit 1 ;;
          esac
          if grep -F 'not found' /tmp/ldd.txt; then
            echo "ERROR: at least one transitive dependency missing"; exit 1
          fi
          cd -
          cd dist/toucan-camera-server-linux && zip -r ../toucan-camera-server-linux.zip . && cd -

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: toucan-camera-server-linux
          path: dist/toucan-camera-server-linux.zip
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Android — arm64-v8a
  # Builds the Rust cdylib with cargo-ndk, then assembles a debug APK and a
  # debug AAB with Gradle. Release signing can be added later via secrets.
  # ---------------------------------------------------------------------------
  build-android:
    name: Build (Android)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android NDK
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;27.2.12479018" >/dev/null
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> $GITHUB_ENV

      - name: Install Rust targets
        run: rustup target add aarch64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Build Rust library
        run: |
          cargo ndk \
            -t arm64-v8a \
            -o android/app/src/main/jniLibs \
            build --release --features backend-camera2-android,backend-remote

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bump Android version
        run: node .github/workflows/androidBumpVersion.js

      - name: Build AAB (release)
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew bundleRelease

      - name: Setup Bundletool
        run: wget https://github.com/google/bundletool/releases/download/1.15.4/bundletool-all-1.15.4.jar -O bundletool.jar

      - name: Sign AAB and extract signed APK
        run: |
          echo ${{ secrets.KS_KEY_B64 }} | base64 -d > keystore.jks
          java -jar bundletool.jar build-apks \
            --bundle=android/app/build/outputs/bundle/release/app-release.aab \
            --output=android/app/build/outputs/bundle/release/app-release.apks \
            --mode=universal \
            --ks=keystore.jks \
            --ks-pass=pass:${{ secrets.KS_STORE_PASS }} \
            --ks-key-alias=${{ secrets.KS_ALIAS }} \
            --key-pass=pass:${{ secrets.KS_ALIAS_PASS }}
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
            -storepass ${{ secrets.KS_STORE_PASS }} \
            -keystore keystore.jks \
            android/app/build/outputs/bundle/release/app-release.aab \
            ${{ secrets.KS_ALIAS }} \
            -keypass ${{ secrets.KS_ALIAS_PASS }}
          cd android/app/build/outputs/bundle/release/
          unzip -p app-release.apks universal.apk > app-release.apk

      - name: Package outputs
        run: |
          mkdir -p app-android
          cp android/app/build/outputs/bundle/release/app-release.aab \
             app-android/toucan-camera-server.aab
          cp android/app/build/outputs/bundle/release/app-release.apk \
             app-android/toucan-camera-server.apk
          cd app-android && zip -r ../toucan-camera-server-android.zip . && cd ..
          cd android/app/src/main/jniLibs/arm64-v8a && zip -r $GITHUB_WORKSPACE/toucan-camera-lib-android.zip . && cd $GITHUB_WORKSPACE

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: toucan-camera-server-android
          path: toucan-camera-server-android.zip
          if-no-files-found: error

      - name: Upload lib artifact
        uses: actions/upload-artifact@v4
        with:
          name: toucan-camera-server-lib-android
          path: toucan-camera-lib-android.zip
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Attach to current draft release
  # Runs on master/dev pushes. Finds the most recent draft release and uploads
  # built binaries to it. Does nothing if no draft release exists.
  # ---------------------------------------------------------------------------
  release:
    name: Attach to draft release
    needs: [build-macos, build-windows, build-linux, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: toucan-camera-server-macos
          path: dist/

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: toucan-camera-server-windows
          path: dist/

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: toucan-camera-server-linux
          path: dist/

      - name: Download Android app artifact
        uses: actions/download-artifact@v4
        with:
          name: toucan-camera-server-android
          path: dist/

      - name: Download Android lib artifact
        uses: actions/download-artifact@v4
        with:
          name: toucan-camera-server-lib-android
          path: dist/

      - name: Attach assets to current draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DRAFT_TAG=$(gh release list \
            --repo "$GITHUB_REPOSITORY" \
            --limit 100 \
            --json tagName,isDraft,createdAt \
            --jq 'map(select(.isDraft == true)) | sort_by(.createdAt) | last | .tagName // empty')

          if [ -n "$DRAFT_TAG" ]; then
            echo "Draft release found ($DRAFT_TAG) — uploading assets"
            gh release upload "$DRAFT_TAG" \
              dist/toucan-camera-server-macos.zip \
              dist/toucan-camera-server-windows.zip \
              dist/toucan-camera-server-linux.zip \
              dist/toucan-camera-server-android.zip \
              dist/toucan-camera-lib-android.zip \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          else
            echo "No draft release found — skipping upload"
          fi
