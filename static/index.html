<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toucan Camera Server</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 2rem;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: .04em;
      color: #fff;
      margin-bottom: 1.5rem;
    }

    #refresh-btn {
      background: none;
      border: 1px solid #444;
      color: #aaa;
      padding: .35rem .8rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: .85rem;
      margin-left: 1rem;
      vertical-align: middle;
      transition: border-color .15s, color .15s;
    }

    #refresh-btn:hover {
      border-color: #888;
      color: #fff;
    }

    #camera-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      max-width: 960px;
    }

    .camera-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      overflow: hidden;
    }

    .camera-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: .9rem 1.2rem;
    }

    .camera-name {
      flex: 1;
      font-weight: 500;
      font-size: 1rem;
    }

    .badge {
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .05em;
      text-transform: uppercase;
      padding: .2rem .55rem;
      border-radius: 4px;
    }

    .badge-connected {
      background: #14532d;
      color: #4ade80;
    }

    .badge-disconnected {
      background: #2a1a1a;
      color: #888;
    }

    .btn {
      border: none;
      border-radius: 6px;
      padding: .4rem .9rem;
      font-size: .85rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity .15s;
      white-space: nowrap;
    }

    .btn:disabled {
      opacity: .4;
      cursor: default;
    }

    .btn-connect {
      background: #166534;
      color: #bbf7d0;
    }

    .btn-disconnect {
      background: #7f1d1d;
      color: #fca5a5;
    }

    .btn-liveview {
      background: #1e3a5f;
      color: #93c5fd;
    }

    .btn-params {
      background: #2d1f5e;
      color: #c4b5fd;
    }

    .btn-capture {
      background: #4a2000;
      color: #fdba74;
    }

    .btn-capture.capturing {
      background: #78350f;
      color: #fde68a;
    }

    .btn:not(:disabled):hover {
      opacity: .8;
    }

    /* Collapsible panels */
    .panel {
      display: none;
      border-top: 1px solid #2a2a2a;
      padding: 1rem 1.2rem;
      background: #111;
    }

    .panel.open {
      display: block;
    }

    /* Live view */
    .panel img {
      display: block;
      max-width: 100%;
      border-radius: 6px;
      background: #000;
    }

    .panel-error {
      color: #f87171;
      font-size: .85rem;
      margin-top: .5rem;
    }

    /* Parameters */
    .params-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: .75rem;
    }

    .param-item {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: .65rem .85rem;
    }

    .param-item.disabled {
      opacity: 0.4;
      pointer-events: none;
    }

    .param-label {
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: .35rem;
    }

    .param-current {
      font-size: .95rem;
      color: #fff;
      margin-bottom: .4rem;
    }

    .param-select {
      width: 100%;
      background: #252525;
      border: 1px solid #3a3a3a;
      color: #e0e0e0;
      border-radius: 5px;
      padding: .3rem .5rem;
      font-size: .82rem;
      cursor: pointer;
    }

    .param-select:focus {
      outline: none;
      border-color: #666;
    }

    .param-range {
      width: 100%;
      accent-color: #60a5fa;
      cursor: pointer;
    }

    .param-range-row {
      display: flex;
      align-items: center;
      gap: .4rem;
    }

    .param-range-val {
      font-size: .8rem;
      color: #aaa;
      white-space: nowrap;
      min-width: 3rem;
      text-align: right;
    }

    .param-toggle {
      display: flex;
      align-items: center;
      gap: .5rem;
      margin-top: .1rem;
    }

    .toggle-track {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }

    .toggle-track input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: #333;
      border-radius: 20px;
      cursor: pointer;
      transition: background .2s;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      left: 3px;
      top: 3px;
      background: #888;
      border-radius: 50%;
      transition: transform .2s, background .2s;
    }

    .toggle-track input:checked+.toggle-slider {
      background: #1e3a5f;
    }

    .toggle-track input:checked+.toggle-slider::before {
      transform: translateX(16px);
      background: #60a5fa;
    }

    .toggle-label {
      font-size: .82rem;
      color: #aaa;
    }

    .params-loading {
      color: #555;
      font-style: italic;
      font-size: .9rem;
    }

    #empty {
      color: #555;
      font-style: italic;
      padding: 1rem 0;
    }

    /* Remote peers */
    #peers-section {
      max-width: 960px;
      margin-bottom: 2rem;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 1.1rem 1.2rem;
    }

    .section-title {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: .04em;
      color: #fff;
      margin-bottom: .9rem;
    }

    .peer-add {
      display: flex;
      flex-wrap: wrap;
      gap: .5rem;
      align-items: center;
    }

    .peer-input {
      background: #252525;
      border: 1px solid #3a3a3a;
      color: #e0e0e0;
      border-radius: 5px;
      padding: .42rem .6rem;
      font-size: .85rem;
    }

    .peer-input:focus {
      outline: none;
      border-color: #666;
    }

    #peer-url {
      flex: 2 1 220px;
    }

    #peer-token {
      flex: 1 1 140px;
    }

    #peers-list {
      margin-top: .4rem;
    }

    .peers-empty {
      color: #555;
      font-style: italic;
      font-size: .9rem;
      margin-top: .8rem;
    }

    .peer-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: .6rem 0;
      border-top: 1px solid #2a2a2a;
    }

    .peer-url {
      flex: 1;
      font-size: .9rem;
      word-break: break-all;
    }

    .peer-token-val {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: .8rem;
      color: #93c5fd;
      word-break: break-all;
      max-width: 40%;
    }
  </style>
</head>

<body>
  <h1>
    Toucan Camera Server
    <button id="refresh-btn" onclick="loadCameras()">Refresh</button>
  </h1>
  <section id="peers-section" style="display:none">
    <h2 class="section-title">Remote peers</h2>
    <div class="peer-add">
      <input id="peer-url" class="peer-input" type="text" placeholder="host:port or http://host:port">
      <input id="peer-token" class="peer-input" type="text" placeholder="token (optional)">
      <button id="peer-add-btn" class="btn btn-connect" onclick="addPeer()">Add peer</button>
    </div>
    <p class="panel-error" id="peer-add-err"></p>
    <div id="peers-list"></div>
  </section>

  <div id="camera-list">
    <p id="empty">Loading…</p>
  </div>

  <script>
    const liveViews = {};  // id → true
    const paramPanels = {}; // id → true

    const TOKEN = new URLSearchParams(window.location.search).get('token') ?? '';

    async function api(method, path, body) {
      const opts = { method, headers: { 'Authorization': `Bearer ${TOKEN}` } };
      if (body !== undefined) {
        opts.headers['Content-Type'] = 'application/json';
        opts.body = JSON.stringify(body);
      }
      const res = await fetch(path, opts);
      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        throw new Error(data.error ?? `HTTP ${res.status}`);
      }
      return res;
    }

    // -------------------------------------------------------------------------
    // Remote peers
    // -------------------------------------------------------------------------

    async function loadPeers() {
      const section = document.getElementById('peers-section');
      // The /peers routes only exist when the server is built with the remote
      // backend; hide the whole panel otherwise.
      let res;
      try {
        res = await fetch('/peers', { headers: { 'Authorization': `Bearer ${TOKEN}` } });
      } catch {
        section.style.display = 'none';
        return;
      }
      if (res.status === 404) { section.style.display = 'none'; return; }
      section.style.display = '';

      const list = document.getElementById('peers-list');
      try {
        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          throw new Error(data.error ?? `HTTP ${res.status}`);
        }
        renderPeers(await res.json());
      } catch (e) {
        list.innerHTML = `<p class="peers-empty">Error: ${escHtml(e.message)}</p>`;
      }
    }

    function renderPeers(peers) {
      const list = document.getElementById('peers-list');
      if (!peers.length) {
        list.innerHTML = '<p class="peers-empty">No peer registered.</p>';
        return;
      }
      list.innerHTML = peers.map(p => `
        <div class="peer-row">
          <span class="peer-url">${escHtml(p.url)}</span>
          <span class="peer-token-val">${p.token ? escHtml(p.token) : '—'}</span>
          <button class="btn btn-disconnect" onclick="deletePeer('${escHtml(p.id)}')">Remove</button>
        </div>`).join('');
    }

    async function addPeer() {
      const urlEl = document.getElementById('peer-url');
      const tokenEl = document.getElementById('peer-token');
      const errEl = document.getElementById('peer-add-err');
      const btn = document.getElementById('peer-add-btn');

      errEl.textContent = '';
      const url = urlEl.value.trim();
      if (!url) { errEl.textContent = 'URL is required.'; return; }

      const body = { url };
      if (tokenEl.value.trim()) body.token = tokenEl.value.trim();

      btn.disabled = true;
      btn.textContent = 'Checking…';
      try {
        // The server validates connectivity; a peer it can't reach is not stored.
        await api('POST', '/peers', body);
        urlEl.value = ''; tokenEl.value = '';
        await loadPeers();
        await loadCameras();
      } catch (e) {
        errEl.textContent = e.message;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Add peer';
      }
    }

    async function deletePeer(id) {
      try { await api('DELETE', `/peers/${id}`); }
      catch (e) { alert(`Remove failed: ${e.message}`); }
      await loadPeers();
      await loadCameras();
    }

    // -------------------------------------------------------------------------
    // Camera list
    // -------------------------------------------------------------------------

    async function loadCameras() {
      const list = document.getElementById('camera-list');
      try {
        const cameras = await api('GET', '/cameras').then(r => r.json());

        const ids = new Set(cameras.map(c => c.id));
        for (const id of Object.keys(liveViews)) if (!ids.has(id)) stopLiveView(id);
        for (const id of Object.keys(paramPanels)) if (!ids.has(id)) closeParams(id);

        if (cameras.length === 0) {
          list.innerHTML = '<p id="empty">No camera detected.</p>';
          return;
        }

        document.getElementById('empty')?.remove();

        const existing = new Set([...list.querySelectorAll('.camera-card')].map(el => el.dataset.id));

        for (const cam of cameras) {
          if (existing.has(cam.id)) {
            updateCard(cam);
          } else {
            list.appendChild(buildCard(cam));
          }
          existing.delete(cam.id);
        }

        for (const id of existing) {
          document.querySelector(`.camera-card[data-id="${id}"]`)?.remove();
        }

      } catch (e) {
        list.innerHTML = `<p id="empty">Error: ${e.message}</p>`;
      }
    }

    function buildCard(cam) {
      const card = document.createElement('div');
      card.className = 'camera-card';
      card.dataset.id = cam.id;
      card.innerHTML = `
        <div class="camera-header">
          <span class="camera-name">${escHtml(cam.name)}</span>
          <span class="badge"></span>
          <button class="btn btn-connect"    onclick="connect('${cam.id}')">Connect</button>
          <button class="btn btn-disconnect" onclick="disconnect('${cam.id}')">Disconnect</button>
          <button class="btn btn-params"     onclick="toggleParams('${cam.id}')">Parameters</button>
          <button class="btn btn-capture"    onclick="capturePhoto('${cam.id}', this)">Capture</button>
          <button class="btn btn-liveview"   onclick="toggleLiveView('${cam.id}')">Live view</button>
        </div>
        <div class="panel" id="params-panel-${cam.id}">
          <div class="params-grid" id="params-grid-${cam.id}"></div>
          <p class="panel-error" id="params-err-${cam.id}"></p>
        </div>
        <div class="panel" id="lv-${cam.id}">
          <img id="lv-img-${cam.id}" alt="Live view">
          <p class="panel-error" id="lv-err-${cam.id}"></p>
        </div>`;
      updateCard(cam, card);
      return card;
    }

    function updateCard(cam, card) {
      card = card ?? document.querySelector(`.camera-card[data-id="${cam.id}"]`);
      if (!card) return;

      const badge = card.querySelector('.badge');
      const btnConnect = card.querySelector('.btn-connect');
      const btnDisconn = card.querySelector('.btn-disconnect');
      const btnParams = card.querySelector('.btn-params');
      const btnCapture = card.querySelector('.btn-capture');
      const btnLv = card.querySelector('.btn-liveview');

      if (cam.connected) {
        badge.textContent = 'Connected';
        badge.className = 'badge badge-connected';
        btnConnect.disabled = true;
        btnDisconn.disabled = false;
        btnParams.disabled = false;
        btnCapture.disabled = false;
        btnLv.disabled = false;
      } else {
        badge.textContent = 'Disconnected';
        badge.className = 'badge badge-disconnected';
        btnConnect.disabled = false;
        btnDisconn.disabled = true;
        btnParams.disabled = true;
        btnCapture.disabled = true;
        btnLv.disabled = true;
        if (liveViews[cam.id]) stopLiveView(cam.id);
        if (paramPanels[cam.id]) closeParams(cam.id);
      }
    }

    // -------------------------------------------------------------------------
    // Connect / disconnect
    // -------------------------------------------------------------------------

    async function connect(id) {
      try { await api('PUT', `/cameras/${id}/connect`); }
      catch (e) { alert(`Connect failed: ${e.message}`); }
      await loadCameras();
    }

    async function disconnect(id) {
      stopLiveView(id);
      closeParams(id);
      try { await api('PUT', `/cameras/${id}/disconnect`); }
      catch (e) { alert(`Disconnect failed: ${e.message}`); }
      await loadCameras();
    }

    // -------------------------------------------------------------------------
    // Parameters panel
    // -------------------------------------------------------------------------

    async function toggleParams(id) {
      if (paramPanels[id]) {
        closeParams(id);
      } else {
        await openParams(id);
      }
    }

    async function openParams(id) {
      const panel = document.getElementById(`params-panel-${id}`);
      const grid = document.getElementById(`params-grid-${id}`);
      const err = document.getElementById(`params-err-${id}`);

      err.textContent = '';
      grid.innerHTML = '<p class="params-loading">Loading…</p>';
      panel.classList.add('open');
      paramPanels[id] = true;

      const btn = document.querySelector(`.camera-card[data-id="${id}"] .btn-params`);
      if (btn) btn.textContent = 'Hide params';

      try {
        const params = await api('GET', `/cameras/${id}/parameters`).then(r => r.json());
        renderParams(id, params);
      } catch (e) {
        grid.innerHTML = '';
        err.textContent = `Failed to load parameters: ${e.message}`;
      }
    }

    function closeParams(id) {
      const panel = document.getElementById(`params-panel-${id}`);
      if (!panel) return;
      panel.classList.remove('open');
      delete paramPanels[id];

      const btn = document.querySelector(`.camera-card[data-id="${id}"] .btn-params`);
      if (btn) btn.textContent = 'Parameters';
    }

    function renderParams(id, params) {
      const grid = document.getElementById(`params-grid-${id}`);
      if (!params.length) {
        grid.innerHTML = '<p class="params-loading">No settable parameters for the current mode.</p>';
        return;
      }

      grid.innerHTML = params.map(p => renderParamItem(p, id)).join('');

      grid.querySelectorAll('.param-checkbox').forEach(el => {
        el.addEventListener('change', () => setParamBoolean(el));
      });
      grid.querySelectorAll('.param-select').forEach(el => {
        el.addEventListener('change', () => setParamSelect(el));
      });
      grid.querySelectorAll('.param-range').forEach(el => {
        const valEl = el.parentElement.querySelector('.param-range-val');
        el.addEventListener('input', () => { if (valEl) valEl.textContent = el.value; });
        el.addEventListener('change', () => setParamRange(el));
      });
    }

    function renderParamItem(p, id) {
      const name = escHtml(formatParamName(p.type));
      const disabledCls = p.disabled ? ' disabled' : '';
      const disabledAttr = p.disabled ? ' disabled' : '';

      if (p.kind === 'boolean') {
        const checked = p.current ? 'checked' : '';
        const isAuto = p.type.includes('_auto');
        const onLabel = isAuto ? 'auto' : 'true';
        const offLabel = isAuto ? 'manual' : 'false';
        return `
          <div class="param-item${disabledCls}">
            <div class="param-label">${name}</div>
            <div class="param-toggle">
              <label class="toggle-track">
                <input type="checkbox" class="param-checkbox" ${checked}${disabledAttr}
                       data-device-id="${escHtml(id)}" data-kind="${escHtml(p.type)}">
                <span class="toggle-slider"></span>
              </label>
              <span class="toggle-label">${p.current ? onLabel : offLabel}</span>
            </div>
          </div>`;
      }

      if (p.kind === 'range') {
        const cur = p.current;
        const step = p.step || 1;
        return `
          <div class="param-item${disabledCls}">
            <div class="param-label">${name}</div>
            <div class="param-range-row">
              <input type="range" class="param-range"
                     min="${p.min}" max="${p.max}" step="${step}" value="${cur}"${disabledAttr}
                     data-device-id="${escHtml(id)}" data-kind="${escHtml(p.type)}">
              <span class="param-range-val">${cur}</span>
            </div>
          </div>`;
      }

      // select or range_select — p.current is the raw value key; look up the label for display
      const currentLabel = p.options.find(o => o.value === p.current)?.label ?? p.current;
      return `
        <div class="param-item${disabledCls}">
          <div class="param-label">${name}</div>
          <div class="param-current">${escHtml(currentLabel)}</div>
          <select class="param-select"${disabledAttr} data-device-id="${escHtml(id)}" data-kind="${escHtml(p.type)}">
            ${p.options.map(o => `
              <option value="${escHtml(o.value)}" ${o.value === p.current ? 'selected' : ''}>
                ${escHtml(o.label)}
              </option>`).join('')}
          </select>
        </div>`;
    }

    async function setParamBoolean(checkbox) {
      const deviceId = checkbox.dataset.deviceId;
      const kind = checkbox.dataset.kind;
      const value = checkbox.checked ? 'true' : 'false';

      checkbox.disabled = true;
      try {
        await api('PUT', `/cameras/${deviceId}/parameters`, { type: kind, value });
      } catch (e) {
        alert(`Failed to set ${formatParamName(kind)}: ${e.message}`);
      } finally {
        await refreshParams(deviceId);
      }
    }

    async function setParamSelect(select) {
      const deviceId = select.dataset.deviceId;
      const kind = select.dataset.kind;
      const value = select.value; // always a string — API expects string values

      select.disabled = true;
      try {
        await api('PUT', `/cameras/${deviceId}/parameters`, { type: kind, value });
      } catch (e) {
        alert(`Failed to set ${formatParamName(kind)}: ${e.message}`);
      } finally {
        await refreshParams(deviceId);
      }
    }

    async function setParamRange(input) {
      const deviceId = input.dataset.deviceId;
      const kind = input.dataset.kind;
      const value = input.value; // always a string — API expects string values

      input.disabled = true;
      try {
        await api('PUT', `/cameras/${deviceId}/parameters`, { type: kind, value });
      } catch (e) {
        alert(`Failed to set ${formatParamName(kind)}: ${e.message}`);
      } finally {
        // Re-fetch all parameters: a range change can flip other params' disabled
        // state (e.g. zoom enables/disables pan/tilt), just like the boolean and
        // select setters do.
        await refreshParams(deviceId);
      }
    }

    async function refreshParams(id) {
      const grid = document.getElementById(`params-grid-${id}`);
      const err = document.getElementById(`params-err-${id}`);
      try {
        const params = await api('GET', `/cameras/${id}/parameters`).then(r => r.json());
        err.textContent = '';
        renderParams(id, params);
      } catch (e) {
        err.textContent = `Failed to reload parameters: ${e.message}`;
      }
    }

    function formatParamName(type) {
      return type.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
    }

    // -------------------------------------------------------------------------
    // Capture
    // -------------------------------------------------------------------------

    async function capturePhoto(id, btn) {
      btn.disabled = true;
      btn.classList.add('capturing');
      btn.textContent = 'Capturing…';

      try {
        const res = await fetch(`/cameras/${id}/capture`, { method: 'POST', headers: { 'Authorization': `Bearer ${TOKEN}` } });
        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          throw new Error(data.error ?? `HTTP ${res.status}`);
        }

        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `capture-${new Date().toISOString().replace(/[:.]/g, '-')}.jpg`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      } catch (e) {
        alert(`Capture failed: ${e.message}`);
      } finally {
        btn.classList.remove('capturing');
        btn.textContent = 'Capture';
        btn.disabled = false;
      }
    }

    // -------------------------------------------------------------------------
    // Live view
    // -------------------------------------------------------------------------

    function toggleLiveView(id) {
      liveViews[id] ? stopLiveView(id) : startLiveView(id);
    }

    function startLiveView(id) {
      const panel = document.getElementById(`lv-${id}`);
      const img = document.getElementById(`lv-img-${id}`);
      const err = document.getElementById(`lv-err-${id}`);

      err.textContent = '';
      img.src = `/cameras/${id}/liveview?t=${Date.now()}&token=${encodeURIComponent(TOKEN)}`;
      img.onerror = () => {
        err.textContent = 'Stream interrupted — camera may have disconnected.';
        stopLiveView(id);
      };

      panel.classList.add('open');
      liveViews[id] = true;

      const btn = document.querySelector(`.camera-card[data-id="${id}"] .btn-liveview`);
      if (btn) btn.textContent = 'Stop';
    }

    function stopLiveView(id) {
      const panel = document.getElementById(`lv-${id}`);
      const img = document.getElementById(`lv-img-${id}`);
      if (!panel) return;

      // Force-abort the MJPEG connection. Simply removing/replacing the node is
      // not enough — Chrome keeps the multipart/x-mixed-replace stream open in
      // the background. Changing the src to a terminal value makes the browser
      // cancel the in-flight request for this element; we also drop the onerror
      // handler first so the cancellation doesn't surface as a spurious error.
      if (img) {
        img.onerror = null;
        img.src = 'data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==';
        const newImg = document.createElement('img');
        newImg.id = `lv-img-${id}`;
        newImg.alt = 'Live view';
        img.replaceWith(newImg);
      }

      panel.classList.remove('open');
      delete liveViews[id];

      const btn = document.querySelector(`.camera-card[data-id="${id}"] .btn-liveview`);
      if (btn) btn.textContent = 'Live view';
    }

    // -------------------------------------------------------------------------
    // Utils
    // -------------------------------------------------------------------------

    function escHtml(s) {
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    loadCameras();
    loadPeers();
    setInterval(() => { loadCameras(); loadPeers(); }, 5000);
  </script>
</body>

</html>
